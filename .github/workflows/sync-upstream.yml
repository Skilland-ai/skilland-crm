name: Sync from upstream

on:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/twentyhq/twenty.git || true
          git fetch upstream main

      - name: Check for new changes
        id: check
        run: |
          if git diff --quiet HEAD..upstream/main; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
          else
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create sync branch and merge
        if: steps.check.outputs.up_to_date == 'false'
        id: merge
        run: |
          BRANCH="sync/upstream-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"

          if git merge upstream/main --no-edit; then
            echo "status=clean" >> "$GITHUB_OUTPUT"
          else
            git add -A
            git commit -m "chore: merge upstream (conflicts need resolution)"
            echo "status=conflicts" >> "$GITHUB_OUTPUT"
          fi

          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.check.outputs.up_to_date == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_STATUS: ${{ steps.merge.outputs.status }}
          BRANCH: ${{ steps.merge.outputs.branch }}
        run: |
          BODY="Automated sync from [twentyhq/twenty](https://github.com/twentyhq/twenty) main branch."
          if [ "$MERGE_STATUS" = "conflicts" ]; then
            BODY="$BODY

          > **Warning:** Merge conflicts detected — manual resolution required."
          fi

          gh pr create \
            --title "chore: sync upstream $(date +%Y-%m-%d)" \
            --body "$BODY" \
            --base main \
            --head "$BRANCH"
